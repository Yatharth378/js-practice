<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizz Buzz</title>
</head>

<body>
    <h1>Results in console log.</h1>
    <script>
        let n = parseInt(prompt("Please enter the number you would like to FizzBuzz up to:"));
        for (let i = 1; i <= n; i++) {
            if (i % 15 == 0) {
                console.log("Fizz Buzz");
            } else if (i % 5 == 0) {
                console.log("Buzz");
            } else if (i % 3 == 0) {
                console.log("Fizz");
            } else {
                console.log(i);
            }
        }
    </script>
</body>
</html>
