<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of tripled evens</title>
</head>

<body>
    <h1>Results in console log.(example array = [1,2,3,4,5,6,7,8])</h1>    
    <script>
        function sumOfTripledEvens(array) {
            return array
                .filter((num) => num % 2 === 0)
                .map((num) => num * 3)
                .reduce((acc, curr) => acc + curr);
        }
        const good = [1,2,3,4,5,6,7,8];
        console.log(sumOfTripledEvens(good));
    </script>

</body>

</html>
