<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Right Triangle</title>
</head>

<body>
    <h2>Made a right triangle using *. Result in console log.</h2>
    <script>
        for (let i = 0; i < 5; i++) {
            row = "";
            for (let j = 0; j <= i; j++) {
                row += "*";
            }
            console.log(row);
        }
    </script>

</body>

</html>
